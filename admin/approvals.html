<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Approvals — WVWCCC Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/chamber.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin">
  <div class="admin-shell">
    <aside class="admin-sidebar" data-admin-nav></aside>
    <div class="admin-main">
      <div class="admin-topbar"><h1>Approvals</h1></div>
      <div class="admin-content">
        <p id="adminError" class="admin-notice" hidden></p>
        <p class="admin-notice">New members and community-submitted events wait here for your review — nothing goes public until you approve it.</p>
        <div class="panel">
          <div class="panel__head"><h3>Pending members</h3></div>
          <table class="admin-table"><thead><tr><th>Member</th><th>Category</th><th>Action</th></tr></thead><tbody id="approvalList"></tbody></table>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/api-base.js"></script>
  <script src="admin.js"></script>
  <script>Admin.initApprovals();</script>
</body>
</html>
