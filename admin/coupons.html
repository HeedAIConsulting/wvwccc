<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Promo Codes — WVWCCC Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/chamber.css" />
  <link rel="stylesheet" href="admin.css?v=20260702a" />
</head>
<body class="admin">
  <div class="admin-shell">
    <aside class="admin-sidebar" data-admin-nav></aside>
    <div class="admin-main">
      <div class="admin-topbar"><h1>Promo Codes</h1></div>
      <div class="admin-content">
        <p id="adminError" class="admin-notice" hidden></p>
        <p class="admin-notice">Create discount codes for checkout — percent or dollar off, with an optional expiration date and use limit. Buyers enter the code on the checkout page; the discount shows on their receipt.</p>

        <div class="panel">
          <div class="panel__head"><h3>Create or update a code</h3></div>
          <form id="couponForm" style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:14px">
            <div class="field"><label>Code</label><input name="code" required placeholder="GALA25" style="text-transform:uppercase" /></div>
            <div class="field"><label>Type</label>
              <select name="kind" class="admin-select"><option value="percent">Percent off</option><option value="fixed">Dollars off</option></select></div>
            <div class="field"><label>Amount</label><input name="amount" type="number" min="0.01" step="0.01" required placeholder="25" /></div>
            <div class="field"><label>Applies to</label>
              <select name="appliesTo" class="admin-select">
                <option value="all">Everything</option>
                <option value="ticket">Event tickets</option>
                <option value="donation">Donations</option>
                <option value="payment">Office payment links</option>
              </select></div>
            <div class="field"><label>Expires (optional)</label><input name="expiresAt" type="datetime-local" /></div>
            <div class="field"><label>Max uses (optional)</label><input name="maxUses" type="number" min="1" step="1" placeholder="Unlimited" /></div>
            <div class="field" style="grid-column:span 2"><label>Description (optional)</label><input name="description" placeholder="Gala early supporter discount" /></div>
            <div style="grid-column:span 4;text-align:right"><button class="btn btn--forest" type="submit">Save code</button> <span id="couponMsg" class="saved-flash">✓ Saved</span></div>
          </form>
        </div>

        <div class="panel mt-4">
          <div class="panel__head"><h3>All codes</h3></div>
          <table class="admin-table"><thead><tr><th>Code</th><th>Discount</th><th>Applies to</th><th>Expires</th><th>Used</th><th>Status</th><th></th></tr></thead><tbody id="couponRows"></tbody></table>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/api-base.js"></script>
  <script src="admin.js?v=20260702b"></script>
  <script>Admin.initCoupons();</script>
  <script defer src="/js/support.js?v=20260701a"></script>
</body>
</html>
