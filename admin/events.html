<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Events — WVWCCC Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/chamber.css" />
  <link rel="stylesheet" href="admin.css" />
</head>
<body class="admin">
  <div class="admin-shell">
    <aside class="admin-sidebar" data-admin-nav></aside>
    <div class="admin-main">
      <div class="admin-topbar"><h1>Events</h1></div>
      <div class="admin-content">
        <p class="admin-notice">Editing, ticket caps, and RSVP cutoffs save to the events store in the next pass. This view confirms what the public calendar shows.</p>
        <div class="panel">
          <div class="panel__head"><h3>All events</h3></div>
          <table class="admin-table"><thead><tr><th>Event</th><th>Date</th><th>Venue</th><th>Type</th><th>Home</th></tr></thead><tbody id="eventRows"></tbody></table>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/api-base.js"></script>
  <script src="admin.js"></script>
  <script>Admin.initEvents();</script>
</body>
</html>
