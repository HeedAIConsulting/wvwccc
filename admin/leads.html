<body class="admin">
  <div class="admin-shell">
    <aside class="admin-sidebar" data-admin-nav></aside>
    <div class="admin-main">
      <div class="admin-topbar"><h1>Inquiries &amp; notifications</h1></div>
      <div class="admin-content">
        <p id="adminError" class="admin-notice" hidden></p>
        <p class="admin-notice">Every contact-form and membership inquiry lands here. Email notifications to the office + felicia@ wire in with Microsoft 365 in Phase 3.</p>

          <div style="overflow-x:auto">
            <table class="admin-table"><thead><tr><th>From</th><th>Reason</th><th>Message</th><th>Status</th><th>Mark</th></tr></thead><tbody id="leadRows"></tbody></table>
          </div>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/api-base.js"></script>
  <script src="admin.js?v=20260702b"></script>
  <script>Admin.initLeads();</script>
