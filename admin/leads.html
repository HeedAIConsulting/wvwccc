<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Inquiries — WVWCCC Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/chamber.css" />
  <link rel="stylesheet" href="admin.css?v=20260622g" />
</head>
<body class="admin">
  <div class="admin-shell">
    <aside class="admin-sidebar" data-admin-nav></aside>
    <div class="admin-main">
      <div class="admin-topbar"><h1>Inquiries &amp; notifications</h1></div>
      <div class="admin-content">
        <p id="adminError" class="admin-notice" hidden></p>
        <p class="admin-notice">Every inquiry from the website lands here — in its own section — so nothing lives only in email. Use the tabs to jump between membership applications, event RSVPs, job inquiries, and general messages.</p>
        <div class="panel" style="padding:12px 16px;margin-bottom:14px">
          <input id="leadSearch" type="search" placeholder="🔎 Search inquiries — name, email, event, message…" autocomplete="off"
                 style="width:100%;padding:10px 12px;border:1.5px solid var(--line,#d8d2bf);border-radius:10px;font:inherit" />
        </div>
        <div id="leadSections"><!-- one panel per inquiry type, rendered by admin.js --></div>
      </div>
    </div>
  </div>
  <script src="../js/api-base.js"></script>
  <script src="admin.js?v=20260707a"></script>
  <script>Admin.initLeads();</script>
  <script defer src="/js/support.js?v=20260701a"></script>
</body>
</html>
