<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>AI Assistant — WVWCCC Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/chamber.css" />
  <link rel="stylesheet" href="admin.css?v=20260618d" />
</head>
<body class="admin">
  <div class="admin-shell">
    <aside class="admin-sidebar" data-admin-nav></aside>
    <div class="admin-main">
      <div class="admin-topbar"><h1>AI Assistant <span class="sub" style="font-weight:400">· powered by Claude</span></h1></div>
      <div class="admin-content">
        <p class="admin-notice">Internal staff assistant. Ask it to analyze the membership or draft content — it knows your live Chamber data. Admin-only; nothing here is published automatically.</p>

        <div class="panel" style="display:flex;flex-direction:column;height:calc(100vh - 230px);min-height:420px">
          <div id="chatLog" style="flex:1;overflow-y:auto;padding:18px">
            <div id="chatEmpty">
              <p class="sub" style="margin-bottom:12px">Try one of these, or type your own:</p>
              <div style="display:flex;flex-wrap:wrap;gap:8px">
                <button class="chip" data-suggest>Which business categories do we need more members in?</button>
                <button class="chip" data-suggest>Draft a warm email to attract local restaurants to join the Chamber.</button>
                <button class="chip" data-suggest>Write a LinkedIn post promoting our next networking mixer.</button>
                <button class="chip" data-suggest>Suggest 5 member-recruitment ideas for under-represented industries.</button>
                <button class="chip" data-suggest>Draft a renewal-reminder email for members whose membership is expiring soon.</button>
              </div>
            </div>
          </div>
          <form id="chatForm" style="border-top:1px solid var(--line,#e4e0d6);padding:12px;display:flex;gap:10px;align-items:flex-end">
            <textarea id="chatInput" rows="1" placeholder="Ask the assistant…  (Enter to send, Shift+Enter for a new line)" style="flex:1;resize:none;min-height:42px;max-height:180px;padding:10px 12px;border:1px solid var(--line,#d7d2c6);border-radius:10px;font:inherit"></textarea>
            <button class="btn btn--forest" type="submit">Send</button>
          </form>
        </div>

      </div>
    </div>
  </div>
  <script src="../js/api-base.js"></script>
  <script src="admin.js?v=20260618d"></script>
  <script>Admin.initAssistant();</script>
</body>
</html>
