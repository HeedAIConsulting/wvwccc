<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Pay Log — WVWCCC Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/chamber.css" />
  <link rel="stylesheet" href="admin.css?v=20260702a" />
</head>
<body class="admin">
  <div class="admin-shell">
    <aside class="admin-sidebar" data-admin-nav></aside>
    <div class="admin-main">
      <div class="admin-topbar"><h1>Pay Log</h1></div>
      <div class="admin-content">
        <p id="adminError" class="admin-notice" hidden></p>
        <p class="admin-notice">Every membership, ticket, and donation processed through AGMS is logged here. Use Refund to send a payment back to the card; charges still awaiting settlement are voided automatically.</p>
        <div class="panel">
          <div class="panel__head"><h3>All payments</h3></div>
          <table class="admin-table"><thead><tr><th>Date</th><th>Payer</th><th>For</th><th>Amount</th><th>Status</th><th>Txn</th><th></th></tr></thead><tbody id="orderRows"></tbody></table>
        </div>
      </div>
    </div>
  </div>
  <script src="../js/api-base.js"></script>
  <script src="admin.js?v=20260708b"></script>
  <script>Admin.initOrders();</script>
  <script defer src="/js/support.js?v=20260701a"></script>
</body>
</html>
