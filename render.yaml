# West Valley · Warner Center Chamber of Commerce — production blueprint.
# POC stays on its own separate Render service; this is a NEW, independent service.

databases:
  - name: wvwccc-db
    plan: basic-256mb        # bump to standard as the roster + orders grow
    region: oregon
    postgresMajorVersion: "16"

services:
  - type: web
    name: wvwccc-production
    runtime: node
    plan: standard            # NOT free — public site cannot tolerate cold starts
    region: oregon
    # Dedicated repo (HeedAIConsulting/wvwccc): code is at the repo root, no rootDir.
    buildCommand: npm install
    preDeployCommand: npm run migrate    # apply backend/schema.sql before traffic flips
    startCommand: npm start
    healthCheckPath: /healthz
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: wvwccc-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true   # Render generates a strong secret once
      # ── AI Concierge ──
      - key: GEMINI_API_KEY        # Heed key; always gemini-flash-latest
        sync: false
      - key: ANTHROPIC_API_KEY     # fallback, optional
        sync: false
      # ── Payments: AGMS on the NMI gateway ──
      # LIVE merchant account `woodlandhillscc` (keys from Eduardo @ AGMS 2026-07-02,
      # screenshots in agms/ — gitignored). Set the private API key (Key ID 14789275)
      # in the Render dashboard; never commit it.
      - key: AGMS_SECURITY_KEY     # private API key, source API+Cart
        sync: false
      - key: AGMS_API_BASE         # prod: https://agms.transactiongateway.com | sandbox: https://sandbox.nmi.com
        sync: false
      - key: AGMS_USERNAME
        value: woodlandhillscc
