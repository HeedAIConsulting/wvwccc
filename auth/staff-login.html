<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Staff Login — WVWCCC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/chamber.css" />
</head>
<body style="min-height:100vh;display:grid;place-items:center;background:var(--green-deep)">
  <main class="card" style="width:min(420px,92vw);text-align:center">
    <img src="../images/wvwccc-logo.png" alt="WVWCCC" width="84" height="84" style="border-radius:50%;margin:0 auto var(--s-4);box-shadow:0 0 0 2px var(--gold)" />
    <h1 style="font-size:1.6rem">Staff &amp; Admin</h1>
    <p class="member-tile__meta">Sign in to the Chamber console.</p>
    <form id="loginForm" class="mt-5" style="text-align:left">
      <div class="field"><label>Email</label><input name="email" type="email" required autocomplete="username" /></div>
      <div class="field"><label>Password</label><input name="password" type="password" required autocomplete="current-password" /></div>
      <p id="msg" class="notice" hidden style="border-color:var(--red);background:#fbeaea;color:var(--red)"></p>
      <button class="btn btn--forest btn--lg" type="submit" style="width:100%">Sign in</button>
    </form>
    <p class="member-tile__meta mt-4"><a href="../index.html">← Back to site</a></p>
  </main>
  <script src="../js/api-base.js"></script>
  <script>
    const form = document.getElementById('loginForm');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.hidden = true;
      const body = Object.fromEntries(new FormData(form));
      const btn = form.querySelector('button'); btn.disabled = true; btn.textContent = 'Signing in…';
      try {
        const r = await fetch(ChamberAPI.url('/api/auth/login'), {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin', body: JSON.stringify(body),
        });
        const data = await r.json();
        if (!r.ok || !data.ok) { msg.textContent = data.error || 'Sign in failed.'; msg.hidden = false; return; }
        location.href = (data.role === 'staff' || data.role === 'admin') ? '../admin/index.html' : '../index.html';
      } catch (err) { msg.textContent = 'Could not sign in right now.'; msg.hidden = false; }
      finally { btn.disabled = false; btn.textContent = 'Sign in'; }
    });
  </script>
</body>
</html>
