<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — West Valley · Warner Center Chamber of Commerce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/chamber.css?v=20260701a" />
</head>
<body>
  <div data-partial="header"></div>
  <section class="section">
    <div class="container" style="display:grid;place-items:center">
      <main class="card" style="width:min(440px,94vw)">
        <div style="text-align:center">
          <img src="../images/wvwccc-logo.png" alt="WVWCCC" width="72" height="72" style="border-radius:50%;margin:0 auto var(--s-3);box-shadow:0 0 0 2px var(--gold)" />
          <h1 style="font-size:1.6rem">Reset your password</h1>
          <p class="member-tile__meta">Enter your email and we'll send reset instructions.</p>
        </div>
        <form id="forgotForm" class="mt-5">
          <div class="field"><label>Email</label><input name="email" type="email" required autocomplete="username" /></div>
          <p id="msg" class="notice" hidden></p>
          <button class="btn btn--forest btn--lg" type="submit" style="width:100%">Send reset instructions</button>
        </form>
        <p class="member-tile__meta mt-4" style="text-align:center">
          Remembered it? <a href="member-login.html">Back to sign in →</a>
        </p>
      </main>
    </div>
  </section>
  <div data-partial="footer"></div>
  <script src="../js/partials.js?v=20260630a"></script>
  <script src="../js/api-base.js?v=20260619a"></script>
  <script>
    ChamberPartials.mount({ active: '', depth: 1, lang: 'en' });
    const form = document.getElementById('forgotForm');
    const msg = document.getElementById('msg');
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      msg.hidden = true;
      const email = new FormData(form).get('email');
      const btn = form.querySelector('button'); btn.disabled = true; btn.textContent = 'Sending…';
      try {
        const r = await fetch(ChamberAPI.url('/api/auth/forgot'), {
          method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ email }),
        });
        const data = await r.json();
        msg.hidden = false;
        if (r.ok && data.ok) {
          form.hidden = true;
          msg.style.borderColor = 'var(--green)';
          msg.innerHTML = '<strong>Check your email.</strong> ' + (data.message || 'If an account exists, reset instructions are on the way.') + ' If you don\'t receive it, contact the Chamber at (818) 347-4737.';
        } else {
          msg.textContent = data.error || 'Something went wrong. Please try again.';
          btn.disabled = false; btn.textContent = 'Send reset instructions';
        }
      } catch (err) { msg.hidden = false; msg.textContent = 'Could not send right now. Please call (818) 347-4737.'; btn.disabled = false; btn.textContent = 'Send reset instructions'; }
    });
  </script>
</body>
</html>
