    if (firstImgEle) {

        imgElement.alt = "Rendition " + index;
        imgElement.crossOrigin = "anonymous";
        imgElement.id = 'renditionImage' + index;
        imgElement.style.cssText = firstImgEle.style.cssText;

    const { scrollTop, scrollHeight, clientHeight } = renditionContainerDiv;
    const margin = 300;
    const isNearBottom = (scrollTop + clientHeight + margin) >= scrollHeight;
    if (isNearBottom && renditionImages[renditionImages.length - 1].rendered) {
        const remainingPagesToRender = totalPageCount - renditionImages.length;
        const nextPageIndex = renditionImages.length;
        if (remainingPagesToRender >= 2) {
            renditionImages.push({ rendered: false });
            renditionImages.push({ rendered: false });

            window.performance.mark('web_app_lpm-loaded');
