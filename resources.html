<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resources &amp; Information — West Valley · Warner Center Chamber of Commerce</title>
  <meta name="description" content="Chamber and community resources — about, membership, our community, visitor info, demographics, important numbers, and more." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/chamber.css?v=20260709a" />
</head>
<body>
  <div data-partial="header"></div>
  <section class="section-sm bg-forest">
    <div class="container">
      <span class="kicker">Explore</span>
      <h1 style="color:#fff">Resources &amp; Information</h1>
      <p class="lead" style="color:rgba(255,255,255,.85);max-width:64ch">Everything about the West Valley · Warner Center — the Chamber, membership, our community, and visitor information.</p>
    </div>
  </section>
  <section class="section">
    <div class="container" id="resGroups"><p class="member-tile__meta">Loading…</p></div>
  </section>
  <div data-partial="footer"></div>
  <script src="js/partials.js?v=20260708a"></script>
  <script src="js/api-base.js?v=20260619a"></script>
  <script>
    ChamberPartials.mount({ active: 'resources', depth: 0, lang: 'en' });
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    const ORDER = ['About & Membership', 'Our Community', 'Resources & Visitor Info', 'More'];
    fetch(ChamberAPI.url('/api/pages')).then((r) => r.json()).then((d) => {
      const groups = {};
      (d.pages || []).forEach((p) => { (groups[p.group] = groups[p.group] || []).push(p); });
      const el = document.getElementById('resGroups');
      const order = ORDER.filter((g) => groups[g]).concat(Object.keys(groups).filter((g) => !ORDER.includes(g)));
      el.innerHTML = order.map((g) => `
        <div style="margin-bottom:var(--s-8)">
          <h2 style="margin-bottom:var(--s-4)">${esc(g)}</h2>
          <div class="grid grid-3" style="gap:var(--s-3)">
            ${groups[g].sort((a, b) => a.title.localeCompare(b.title)).map((p) => `<a class="card card--hover" style="text-decoration:none;color:inherit;padding:15px 18px;display:flex;align-items:center;gap:10px" href="pages/view.html?slug=${encodeURIComponent(p.slug)}"><span style="color:var(--gold-deep)">›</span><strong>${esc(p.title)}</strong></a>`).join('')}
          </div>
        </div>`).join('') || '<p class="notice">No pages yet.</p>';
    }).catch(() => { document.getElementById('resGroups').innerHTML = '<p class="notice">Could not load resources.</p>'; });
  </script>
</body>
</html>
