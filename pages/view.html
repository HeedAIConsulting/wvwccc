<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chamber — West Valley · Warner Center Chamber of Commerce</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="../css/chamber.css" />
  <style>
    .prose{line-height:1.7;color:var(--slate-mid,#33403a)}
    .prose h2,.prose h3,.prose h4{font-family:var(--display);color:var(--green-ink,#1b3326);margin:1.4em 0 .5em}
    .prose p{margin:0 0 1em}
    .prose ul,.prose ol{margin:0 0 1em 1.3em;display:block}
    .prose li{margin:.3em 0}
    .prose a{color:var(--gold-deep,#8c6e14);text-decoration:underline}
    .prose a:hover{color:var(--green-deep,#1f4d3a)}
  </style>
</head>
<body>
  <div data-partial="header"></div>
  <section class="section-sm bg-forest">
    <div class="container">
      <span class="kicker" id="pgKicker">The Chamber</span>
      <h1 id="pgTitle" style="color:#fff">Loading…</h1>
    </div>
  </section>
  <section class="section">
    <div class="container" style="max-width:840px">
      <div id="pgBody" class="prose"><p class="member-tile__meta">Loading…</p></div>
      <p class="mt-7"><a class="btn btn--ghost" href="../resources.html">← All Chamber pages</a></p>
    </div>
  </section>
  <div data-partial="footer"></div>
  <script src="../js/partials.js"></script>
  <script src="../js/api-base.js"></script>
  <script>
    ChamberPartials.mount({ active: '', depth: 1, lang: 'en' });
    const qs = new URLSearchParams(location.search);
    const slug = qs.get('slug') || decodeURIComponent((location.pathname.split('/p/')[1] || '').replace(/\/$/, '')) || '';
    const esc = (s) => String(s == null ? '' : s).replace(/[&<>]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c]));
    fetch(ChamberAPI.url('/api/pages/' + encodeURIComponent(slug))).then((r) => r.json()).then((p) => {
      if (!p || p.error) {
        document.getElementById('pgTitle').textContent = 'Page not found';
        document.getElementById('pgBody').innerHTML = '<div class="notice">That page isn’t available. <a href="../resources.html">Browse all Chamber pages →</a></div>';
        return;
      }
      document.title = p.title + ' — WVWCCC';
      document.getElementById('pgTitle').textContent = p.title;
      document.getElementById('pgKicker').textContent = p.group || 'The Chamber';
      document.getElementById('pgBody').innerHTML = p.html || '<p>(No content.)</p>';
    }).catch(() => { document.getElementById('pgBody').innerHTML = '<div class="notice">Could not load this page.</div>'; });
  </script>
</body>
</html>
