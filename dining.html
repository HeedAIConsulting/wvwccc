<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dine West Valley — West Valley · Warner Center Chamber of Commerce</title>
  <meta name="description" content="Dine West Valley — restaurants, cafés, and eateries that are members of the West Valley · Warner Center Chamber of Commerce. Eat local, support members." />
  <link rel="canonical" href="https://woodlandhillscc.net/dining.html" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="css/chamber.css?v=20260711a" />
</head>
<body>
  <div data-partial="header"></div>
  <section class="section-sm bg-forest">
    <div class="container">
      <span class="kicker">Dine West Valley</span>
      <h1 style="color:#fff">Eat local. Eat member.</h1>
      <p class="lead" style="color:rgba(255,255,255,.85);max-width:62ch">
        Every restaurant here is a Chamber member — from Tarzana to Woodland Hills, Reseda, and the Warner Center. <span id="diningCount"></span>
      </p>
    </div>
  </section>
  <section class="section">
    <div class="container">
      <div id="diningFeatured" hidden></div>
      <div class="card" style="padding:18px 20px;margin-bottom:var(--s-6);background:var(--cream-deep,#f3ecda);border:1px solid var(--gold-soft,#e6dcbf)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:1.3rem">🍽️</span><strong>Ask Wendy where to eat</strong> <span class="member-tile__meta">— e.g. "sushi in Tarzana" or "a steakhouse for a client dinner"</span></div>
        <form id="diningAsk" style="display:flex;gap:8px;flex-wrap:wrap">
          <input id="diningAskInput" placeholder="What are you in the mood for?" style="flex:1;min-width:220px;padding:11px 14px;border:1px solid var(--gold-soft,#e6dcbf);border-radius:10px;font:inherit" />
          <button class="btn btn--forest" type="submit">Ask Wendy</button>
        </form>
        <div id="diningAskOut" style="margin-top:12px"></div>
        <div style="margin-top:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
          <input id="diningSearch" type="search" placeholder="Or filter the list — name, cuisine, neighborhood…" style="flex:1;min-width:220px;padding:10px 13px;border:1px solid var(--line,#d7d2c6);border-radius:10px;font:inherit" />
        </div>
      </div>
      <div id="diningGrid" class="grid grid-3" style="gap:var(--s-5)"><p class="member-tile__meta">Loading member restaurants…</p></div>
    </div>
  </section>
  <div data-partial="footer"></div>
  <script src="js/partials.js?v=20260708a"></script>
  <script src="js/api-base.js?v=20260619a"></script>
  <script src="js/chamber.js?v=20260709b"></script>
  <script>ChamberPartials.mount({ active: 'dining', depth: 0, lang: 'en' }); Chamber.initDining(); Chamber.initFeaturedSlot('dining', '#diningFeatured', { depth: 0 });</script>
</body>
</html>
