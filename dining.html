<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dine West Valley — West Valley · Warner Center Chamber of Commerce</title>
  <meta name="description" content="Dine West Valley — restaurants, cafés, and eateries that are members of the West Valley · Warner Center Chamber of Commerce. Eat local, support members." />

<body>
  <div data-partial="header"></div>
  <section class="section-sm bg-forest">
    <div class="container">
      <span class="kicker">Dine West Valley</span>
      <h1 style="color:#fff">Eat local. Eat member.</h1>

  <script src="js/api-base.js"></script>

  <script>ChamberPartials.mount({ active: 'dining', depth: 0, lang: 'en' }); Chamber.initDining();</script>
