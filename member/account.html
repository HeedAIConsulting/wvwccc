<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

<body>
  <div data-partial="header"></div>
  <section class="section">
    <div class="container container-narrow">
      <p class="member-tile__meta"><a href="index.html">← My Chamber</a></p>
      <span class="kicker">Account</span>
      <h1>Change password</h1>
      <form id="pwForm" class="card mt-5">
        <div class="field"><label>New password</label><input name="password" type="password" minlength="8" required autocomplete="new-password" /></div>
        <div class="field"><label>Confirm password</label><input name="confirm" type="password" minlength="8" required autocomplete="new-password" /></div>
        <p id="pwMsg" class="notice" hidden></p>
        <button class="btn btn--forest btn--lg" type="submit">Update password</button>
      </form>
    </div>
  </section>
  <div data-partial="footer"></div>
  <script src="../js/partials.js?v=20260630a"></script>
  <script src="../js/api-base.js?v=20260619a"></script>

    ChamberPartials.mount({ active: '', depth: 1, lang: 'en' });
    MemberPortal.initAccount();
  </script>
  <script defer src="/js/support.js?v=20260630a"></script>
</body>
</html>
